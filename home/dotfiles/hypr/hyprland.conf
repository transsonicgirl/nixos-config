################################################################################
##  VARIABLES
################################################################################

$mod    = SUPER

# Update this to your preferred terminal if you switch away from kitty
$terminal = kitty
$launcher  = wofi --show run

env = STEAM_FRAME_FORCE_CLOSE,1

################################################################################
## CURSOR
################################################################################

env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24

################################################################################
##  MONITORS
##  Replaces: xrandr calls in ~/.xinitrc
##  DP-2 is primary (right), DP-1 is to its left.
##  `preferred` picks the monitor's native resolution automatically.
##  If you need to force 180Hz explicitly, replace `preferred` with e.g. `2560x1440@180`
################################################################################

monitor = DP-1, preferred, 0x0,     1
monitor = DP-2, preferred, auto-left, 1


################################################################################
##  AUTOSTART
##  Replaces: exec / exec --no-startup-id lines in startup.conf
##  Note: picom is replaced by Hyprland's built-in compositor (see decoration{})
##  Note: fehbg is replaced by swww — run `swww img /path/to/wallpaper` after login
##  Note: xss-lock+i3lock is replaced by hypridle+hyprlock (install separately if wanted)
################################################################################

exec-once = dex --autostart --environment hyprland
exec-once = nm-applet --indicator
exec-once = hyprpaper
exec-once = waybar
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start xdg-desktop-portal-hyprland


################################################################################
##  INPUT
##  Replaces: focus_follows_mouse no
################################################################################

input {
    follow_mouse = 0          # 0 = focus does not follow mouse (matches your i3 config)
    sensitivity  = 0          # pointer sensitivity, 0 = no change
}


################################################################################
##  CATPPUCCIN MOCHA COLORS
##  Same values as your aesthetics.conf
################################################################################

$rosewater = rgb(f5e0dc)
$flamingo  = rgb(f2cdcd)
$pink      = rgb(f5c2e7)
$mauve     = rgb(cba6f7)
$red       = rgb(f38ba8)
$maroon    = rgb(eba0ac)
$peach     = rgb(fab387)
$yellow    = rgb(f9e2af)
$green     = rgb(a6e3a1)
$teal      = rgb(94e2d5)
$sky       = rgb(89dceb)
$sapphire  = rgb(74c7ec)
$blue      = rgb(89b4fa)
$lavender  = rgb(b4befe)
$text      = rgb(cdd6f4)
$subtext1  = rgb(bac2de)
$subtext0  = rgb(a6adc8)
$overlay2  = rgb(9399b2)
$overlay1  = rgb(7f849c)
$overlay0  = rgb(6c7086)
$surface2  = rgb(585b70)
$surface1  = rgb(45475a)
$surface0  = rgb(313244)
$base      = rgb(1e1e2e)
$mantle    = rgb(181825)
$crust     = rgb(11111b)


################################################################################
##  GENERAL — gaps, borders, colors
##  Replaces: gaps/border settings in aesthetics.conf
################################################################################

general {
    gaps_in  = 5
    gaps_out = 0
    border_size = 2

    col.active_border   = $lavender
    col.inactive_border = $overlay0

    layout = dwindle     # closest to i3's tiling behavior
}


################################################################################
##  DECORATION — rounded corners, opacity, blur
##  Replaces: picom.conf
##  Hyprland has a built-in compositor so picom is not needed.
################################################################################

decoration {
    rounding = 5            # matches corner-radius = 5 in picom.conf

    active_opacity   = 1.0
    inactive_opacity = 1.0

    # Terminal opacity (matches picom opacity-rule for Gnome-terminal)
    # Update the class if you use something other than kitty
    # (set per-window below in WINDOW RULES)

    blur {
        enabled = false     # you had no blur configured in picom, keeping it off
    }

    shadow {
        enabled = false     # you had no shadows configured in picom
    }
}


################################################################################
##  ANIMATIONS
##  Hyprland has animations built-in. These are subtle defaults.
##  Set `enabled = false` in the animations{} block to disable entirely.
################################################################################

animations {
    enabled = true

    bezier = ease, 0.25, 0.1, 0.25, 1.0

    animation = windows,    1, 3, ease
    animation = windowsOut, 1, 3, ease
    animation = border,     1, 5, ease
    animation = fade,       1, 3, ease
    animation = workspaces, 1, 4, ease
}


################################################################################
##  DWINDLE LAYOUT
##  Dwindle is the closest match to i3's tiling. It splits alternately
##  horizontal/vertical. `togglesplit` (bound to $mod+c and $mod+v below)
##  flips the split direction for the current node.
################################################################################

dwindle {
    preserve_split = true
    smart_split  = false
}


################################################################################
##  MISC
################################################################################

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    focus_on_activate        = true   # matches: focus_on_window_activation urgent
    # NOTE: workspace_back_and_forth does not exist in Hyprland.
    # Pressing a workspace key while already on it does nothing by default.
    # You can emulate back-and-forth with: bind = $mod, 1, workspace, previous
    # but that changes the behavior for all workspaces. Leaving it out for now.
}


################################################################################
##  FONTS
##  Waybar handles its own font config (see waybar config).
##  Window title font is set via the hyprland theme/decoration system.
################################################################################


################################################################################
##  WORKSPACES
##  Replaces: workspace assignment in workspaces.conf
##  Named workspaces: work, reference, background, then 4-10
################################################################################

workspace = name:work,      monitor:DP-1, default:true
workspace = name:reference, monitor:DP-2
workspace = name:background,monitor:DP-2
workspace = 4,              monitor:DP-1
workspace = 5,              monitor:DP-1
workspace = 6,              monitor:DP-1
workspace = 7,              monitor:DP-1
workspace = 8,              monitor:DP-1
workspace = 9,              monitor:DP-1
workspace = 10,             monitor:DP-1


################################################################################
##  WINDOW RULES
##  Replaces: assign and for_window rules in workspaces.conf
################################################################################

# App → workspace assignments
windowrule = workspace name:background, match:class discord
windowrule = workspace name:reference,  match:class firefox
windowrule = workspace name:work,       match:class code
windowrule = workspace name:work,       match:class Code
windowrule = opacity 0.75 0.75,           match:class kitty

################################################################################
##  KEYBINDS
################################################################################

## — Terminal & launcher —
bind = $mod,       return, exec, $terminal
bind = $mod,       d,      exec, $launcher

## — Kill focused window (i3: $mod+q) —
bind = $mod, q, killactive
bind = $mod SHIFT, Q, exec, hyprctl kill # kill cursor

## — App shortcuts —
bind = $mod SHIFT, f, exec, firefox
bind = $mod SHIFT, d, exec, discord
bind = $mod SHIFT, s, exec, spotify

## — Focus movement: hjkl + arrow keys —
bind = $mod, h,     movefocus, l
bind = $mod, j,     movefocus, d
bind = $mod, k,     movefocus, u
bind = $mod, l,     movefocus, r
bind = $mod, left,  movefocus, l
bind = $mod, down,  movefocus, d
bind = $mod, up,    movefocus, u
bind = $mod, right, movefocus, r

## — Move windows: Shift+hjkl + Shift+arrows —
bind = $mod SHIFT, h,     movewindow, l
bind = $mod SHIFT, j,     movewindow, d
bind = $mod SHIFT, k,     movewindow, u
bind = $mod SHIFT, l,     movewindow, r
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, right, movewindow, r

## — Split direction —
bind = $mod, c, layoutmsg, togglesplit
bind = $mod, v, layoutmsg, togglesplit

## — Fullscreen —
bind = $mod, f, fullscreen, 0

## — Layout switching —
##   i3 has stacking/tabbed/split modes; Hyprland doesn't have direct equivalents.
##   $mod+s / $mod+w are left unbound — add your own if needed.
##   $mod+e toggles the dwindle split as a rough analog to "toggle split" layout.
bind = $mod, e, layoutmsg, togglesplit

## — Float toggle (i3: $mod+Shift+space) —
bind = $mod SHIFT, space, togglefloating

## — Focus toggle float/tile (i3: $mod+space) —
##   Hyprland has no direct equivalent. This cycles focus among all windows instead.
bind = $mod, space, cyclenext

## — Floating window drag (i3: floating_modifier $mod) —
bindm = $mod, mouse:272, movewindow      # mod + left click drag
bindm = $mod, mouse:273, resizewindow    # mod + right click drag

## — Screenshots —
##   Replaces: maim + xclip with grim + slurp + wl-copy
bind = $mod SHIFT,    p, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod CTRL SHIFT, p, exec, grim -g "$(slurp)" ~/Pictures/$(date +%Y-%m-%d_%H-%M-%S).png

## — Audio (pactl + playerctl, same as before) —
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind  = , XF86AudioPlay,        exec, playerctl play-pause
bind  = , XF86AudioNext,        exec, playerctl next
bind  = , XF86AudioPrev,        exec, playerctl previous

## — Audio device switching (same sink/source indices as your i3 config) —
bind = $mod, m, exec, pactl set-default-sink alsa_output.usb-EDIFIER_EDIFIER_G2000_EDI00000X07-01.analog-stereo
bind = $mod, n, exec, pactl set-default-sink alsa_output.pci-0000_13_00.6.analog-stereo

## — Reload / exit —
##   Hyprland auto-reloads when the config file changes, but explicit reload still works.
##   $mod+x had no equivalent purpose (was re-running xinitrc); binding it to reload here.
bind = $mod SHIFT, c, exec, hyprctl reload
bind = $mod SHIFT, r, exec, hyprctl reload
bind = $mod,       x, exec, hyprctl reload
bind = $mod SHIFT, e, exec, hyprctl dispatch exit

## — Workspace switching ($mod+1..0) —
bind = $mod, 1, workspace, name:work
bind = $mod, 2, workspace, name:reference
bind = $mod, 3, workspace, name:background
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

## — Move container to workspace ($mod+Shift+1..0) —
bind = $mod SHIFT, 1, movetoworkspace, name:work
bind = $mod SHIFT, 2, movetoworkspace, name:reference
bind = $mod SHIFT, 3, movetoworkspace, name:background
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10


################################################################################
##  RESIZE SUBMAP
##  Replaces: mode "resize" in resize.conf
##  Note: the original had a typo `mode "resipze"` on the activation bind — fixed here.
################################################################################

bind = $mod, r, submap, resize

submap = resize

# hjkl resize (matches your resize.conf)
binde = , j,         resizeactive, -10 0
binde = , k,         resizeactive,  0 10
binde = , l,         resizeactive,  0 -10
binde = , semicolon, resizeactive,  10 0

# Arrow key resize
binde = , left,  resizeactive, -10 0
binde = , down,  resizeactive,  0 10
binde = , up,    resizeactive,  0 -10
binde = , right, resizeactive,  10 0

# Exit resize mode
bind = , return, submap, reset
bind = , escape, submap, reset
bind = $mod, r,  submap, reset

submap = reset
